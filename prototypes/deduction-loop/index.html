            clue_text: "She asked me to avoid the main roads — said she knew the backway to the temple complex. I asked which one. She said the golden one, the big one, the one from the postcards. Then she said 'the one the king built.' There are many, I told her. She said 'the original.' I took her to the Grand Palace.",
            signals: ['never-colonised', 'Thailand', 'golden-temples'],
            wrong_city_response: "I drive every road in this city. No one matching that description has sat in my back seat."
          },
          {
            archetype: 'Café Owner',
            clue_text: "She came in before the crowds and asked about the Emerald Buddha — specifically whether it was true the king changes its costume three times a year. I said yes. She knew this already, I think. She was testing me. Then she asked about the city's full name — the long one — and when I started reciting it she finished the last part herself. Nobody does that. Very strange woman.",
            signals: ['Grand-Palace', 'Emerald-Buddha', 'longest-place-name'],
            wrong_city_response: "I know every face that walks through my door. That face has never walked through my door."
          }
        ],
        options: [
          { city: 'Bangkok', salience_score: 9 },
          { city: 'Jakarta', salience_score: 8 },
          { city: 'Ho Chi Minh City', salience_score: 8 },
          { city: 'Kuala Lumpur', salience_score: 8 }
        ],
        correct: 0
      },
      {
        // Target: Istanbul — straddles two continents, Hagia Sophia and Blue Mosque, Bosphorus
        target: 'Istanbul',
        witnesses: [
          {
            archetype: 'Museum Guard',
            clue_text: "She moved through the empires wing without a guide — knew exactly what she was looking at. Stopped at the Byzantium section and the Ottoman section. Spent equal time. Said to my colleague: 'Two of the greatest empires in history and they both picked the same city.' She wasn't wrong.",
            signals: ['ancient-empires', 'crossroads', 'major-port'],
            wrong_city_response: "No unauthorised individuals. No matching descriptions. No entry. Good day."
          },
          {
            archetype: 'Hotel Concierge',
            clue_text: "She requested a room with a Bosphorus view — very specific about that. Said she wanted to see both sides from the window. When I said 'both sides of what' she smiled and said 'both continents.' I've had that request before. We get it from guests who know what it means to stand in one world and look at another.",
            signals: ['two-continents', 'Bosphorus', 'Europe-Asia'],
            wrong_city_response: "I review every guest personally. That name has never graced our register."
          },
          {
            archetype: 'Airport Staff',
            clue_text: "She had a connection — said she needed two hours minimum because she wanted to look at the old building before she left. I asked which one. She said 'the one that can't decide if it's a church or a mosque.' I knew immediately. There's only one place where you can see that building and the Blue Mosque in the same photograph. She wanted that view from the departure lounge.",
            signals: ['Hagia-Sophia', 'Blue-Mosque', 'Byzantine-Ottoman'],
            wrong_city_response: "I process thousands of passengers a day. That passport has not crossed this desk."
          }
        ],
        options: [
          { city: 'Istanbul', salience_score: 9 },
          { city: 'Athens', salience_score: 8 },
          { city: 'Cairo', salience_score: 9 },
          { city: 'Rome', salience_score: 9 }
        ],
        correct: 0
      }
    ]
  }
];

// ─── STATE ────────────────────────────────────────────────────────────────────

let S = {
  screen:             'brief',  // 'brief' | 'game' | 'result'
  caseIdx:            0,
  legIdx:             0,
  witnessesRevealed:  1,        // 1–3; Witness 1 auto-reveals at leg start
  wrongGuessesThisLeg: [],      // array of option indices guessed wrong this leg
  lastWrongResponse:  null,     // { city, response } | null — for displaying wrong feedback
  lastCorrect:        false,    // was last guess correct?
  // Per-leg tracking for scoring
  legWitnessesRevealed: [],     // e.g. [1, 2, 1, 3] — witnesses revealed per leg
  legWrongGuesses:      [],     // e.g. [0, 1, 0, 2] — wrong guesses per leg
};

function C()   { return CASES[S.caseIdx]; }
function leg() { return C().legs[S.legIdx]; }

// ─── SCORING ──────────────────────────────────────────────────────────────────
// Path Efficiency % = max(0, 100 - (totalWrongGuesses × 15) - (totalExtraWitnessesRevealed × 5))
// totalExtraWitnessesRevealed = sum of (witnessesRevealed - 1) across all legs

function calcScore() {
  const totalWrong = S.legWrongGuesses.reduce((a, b) => a + b, 0);
  const totalExtraWitnesses = S.legWitnessesRevealed.reduce((a, b) => a + (b - 1), 0);
  return Math.max(0, 100 - (totalWrong * 15) - (totalExtraWitnesses * 5));
}

function scoreEmoji(score) {
  if (score === 100) return '🟩🟩🟩🟩';
  if (score >= 80)  return '🟩🟩🟩🟨';
  if (score >= 60)  return '🟩🟩🟨🟨';
  if (score >= 40)  return '🟩🟨🟨🟨';
  if (score >= 20)  return '🟨🟨🟨🟥';
  return '🟥🟥🟥🟥';
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────

function startCase() {
  S.screen = 'game';
  S.legIdx = 0;
  S.witnessesRevealed = 1;
  S.wrongGuessesThisLeg = [];
  S.lastWrongResponse = null;
  S.lastCorrect = false;
  S.legWitnessesRevealed = [];
  S.legWrongGuesses = [];
  render();
}

function revealWitness() {
  if (S.witnessesRevealed < 3) {
    S.witnessesRevealed++;
    S.lastWrongResponse = null;
    render();
  }
}

function chooseCity(optionIdx) {
  const l = leg();
  // Already eliminated this one
  if (S.wrongGuessesThisLeg.includes(optionIdx)) return;
  // Already correct
  if (S.lastCorrect) return;

  if (optionIdx === l.correct) {
    // Correct guess
    S.lastCorrect = true;
    S.lastWrongResponse = null;
    // Record per-leg stats
    S.legWitnessesRevealed.push(S.witnessesRevealed);
    S.legWrongGuesses.push(S.wrongGuessesThisLeg.length);
    render();
  } else {
    // Wrong guess — record, show response, grey out city
    S.wrongGuessesThisLeg.push(optionIdx);
    const witness = l.witnesses[S.witnessesRevealed - 1];
    S.lastWrongResponse = {
      city: l.options[optionIdx].city,
      response: witness.wrong_city_response
    };
    render();
  }
}

function advance() {
  if (S.legIdx >= 3) {
    S.screen = 'result';
    render();
    return;
  }
  S.legIdx++;
  S.witnessesRevealed = 1;
  S.wrongGuessesThisLeg = [];
  S.lastWrongResponse = null;
  S.lastCorrect = false;
  render();
}

function nextCase() {
  S.caseIdx = (S.caseIdx + 1) % CASES.length;
  S.screen = 'brief';
  S.legIdx = 0;
  S.witnessesRevealed = 1;
  S.wrongGuessesThisLeg = [];
  S.lastWrongResponse = null;
  S.lastCorrect = false;
  S.legWitnessesRevealed = [];
  S.legWrongGuesses = [];
  render();
}

function copyShare() {
  navigator.clipboard.writeText(buildShareText()).then(() => {
    const btn = document.getElementById('copybtn');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy to share'; }, 2000); }
  });
}

function buildShareText() {
  const c = C();
  const score = calcScore();
  const grid = scoreEmoji(score);
  return `🌍 Global Pursuit #${c.number}\n${grid}\nPath Efficiency: ${score}%\n#GlobalPursuit`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function render() {
  document.getElementById('app').innerHTML =
    '<div class="proto-banner">PROTOTYPE — deduction loop test</div>' +
    (S.screen === 'brief'  ? renderBrief()  :
     S.screen === 'game'   ? renderGame()   :
                             renderResult());
}

function renderBrief() {
  const c = C();
  return `<div class="card">
    <div class="game-label">Global Pursuit</div>
    <div class="case-title">Case #${c.number}: ${c.criminal}</div>
    <div class="director-thread">
      <div class="director-header">
        <div class="director-avatar">V</div>
        <div class="director-name-block">
          <div class="director-name">Director Vance</div>
          <div class="director-status">● Secure channel</div>
        </div>
      </div>
      <div class="bubble">${c.crime}</div>
      <div class="bubble">This criminal has outsmarted every agent we have. Until now.</div>
      <div class="bubble">Last seen: <strong>${c.startingCity}, ${c.startingCountry}</strong></div>
      <div class="bubble">The trail starts there. Don't lose it.</div>
    </div>
    <button class="btn btn-gold" onclick="startCase()">Accept case →</button>
  </div>`;
}

function renderGame() {
  const c = C();
  const l = leg();
  const legNum = S.legIdx + 1;
  const isCapture = S.legIdx === 3;

  // Progress dots
  const dots = Array.from({length: 4}, (_, i) => {
    let cls = 'pdot';
    if (i < S.legWitnessesRevealed.length) cls += ' won';
    else if (i === S.legIdx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  // Witness cards
  let witnessCards = '';
  for (let wi = 0; wi < 3; wi++) {
    const w = l.witnesses[wi];
    const isRevealed = (wi + 1) <= S.witnessesRevealed;
    const isNextToReveal = !S.lastCorrect && (wi + 1) === S.witnessesRevealed + 1 && S.witnessesRevealed < 3;

    if (isRevealed) {
      witnessCards += `
        <div class="witness-card revealed">
          <div class="witness-label-row">
            <div class="witness-label">Witness ${wi + 1} · ${w.archetype}</div>
          </div>
          <div class="witness-clue">${w.clue_text}</div>
        </div>`;
    } else if (isNextToReveal) {
      witnessCards += `
        <div class="witness-card locked">
          <div class="witness-label-row">
            <div class="witness-label">Witness ${wi + 1}</div>
            <div class="lock-icon">🔒</div>
          </div>
          <button class="reveal-btn" onclick="revealWitness()">Tap to reveal another witness</button>
        </div>`;
    } else {
      witnessCards += `
        <div class="witness-card locked">
          <div class="witness-label-row">
            <div class="witness-label">Witness ${wi + 1}</div>
            <div class="lock-icon">🔒</div>
          </div>
        </div>`;
    }
  }

  // City buttons
  const cityButtons = l.options.map((opt, i) => {
    const isEliminated = S.wrongGuessesThisLeg.includes(i);
    const isCorrectChoice = S.lastCorrect && i === l.correct;

    let cls = 'city-btn';
    let mark = '';
    if (isCorrectChoice) {
      cls += ' s-correct';
      mark = '✓';
    } else if (isEliminated) {
      cls += ' s-eliminated';
      mark = '✗';
    }

    const dotColor = SALIENCE_COLOR(opt.salience_score);
    const dotHtml = `<span class="salience-dot" style="background:${dotColor}" title="Recognisability: ${opt.salience_score}/10"></span>`;

    const disabled = (S.lastCorrect || isEliminated) ? 'disabled' : '';

    return `<button class="${cls}" onclick="chooseCity(${i})" ${disabled}>
      <span class="city-btn-inner">${dotHtml}${opt.city}</span>
      <span class="mark">${mark}</span>
    </button>`;
  }).join('');

  // Wrong city feedback
  let wrongFeedback = '';
  if (S.lastWrongResponse) {
    wrongFeedback = `
      <div class="feedback-box wrong">
        <div class="feedback-wrong-label">NO MATCH · ${S.lastWrongResponse.city}</div>
        <div class="feedback-wrong-text">${S.lastWrongResponse.response}</div>
      </div>`;
  }

  // Correct city feedback
  let correctFeedback = '';
  let continueBtn = '';
  if (S.lastCorrect) {
    const confirmCity = l.options[l.correct].city;
    const directorLine = isCapture
      ? "Outstanding. They had a twelve-hour head start. Case closed."
      : "Good call, Agent. Keep moving.";
    correctFeedback = `
      <div class="director-confirm">
        <div class="director-confirm-avatar">V</div>
        <div class="director-confirm-bubble">
          <div class="confirm-city-label">Trail confirmed. ${confirmCity} ✓</div>
          ${directorLine}
        </div>
      </div>`;
    continueBtn = `<button class="btn btn-gold" onclick="advance()">${isCapture ? 'See Results' : 'Continue →'}</button>`;
  }

  return `<div class="card">
    <div class="game-label">Global Pursuit · Case #${c.number}</div>
    <div class="progress-row">
      <div class="progress-dots">${dots}</div>
      <div class="leg-counter">Leg ${legNum} of 4</div>
    </div>
    <hr style="margin:12px 0 16px;">
    <div class="section-label">Witnesses</div>
    <div class="witnesses-stack">${witnessCards}</div>
    <div class="city-grid-label">Where did they go?</div>
    <div class="city-list">${cityButtons}</div>
    ${wrongFeedback}
    ${correctFeedback}
    ${continueBtn}
  </div>`;
}

function renderResult() {
  const c = C();
  const score = calcScore();
  const grid = scoreEmoji(score);
  const shareText = buildShareText();

  const totalWrong = S.legWrongGuesses.reduce((a, b) => a + b, 0);
  const totalExtraWit = S.legWitnessesRevealed.reduce((a, b) => a + (b - 1), 0);

  let subtitleParts = [];
  if (totalWrong > 0) subtitleParts.push(`${totalWrong} wrong guess${totalWrong !== 1 ? 'es' : ''}`);
  if (totalExtraWit > 0) subtitleParts.push(`${totalExtraWit} extra witness${totalExtraWit !== 1 ? 'es' : ''} revealed`);
  const subtitle = subtitleParts.length ? subtitleParts.join(' · ') : 'Perfect run';

  return `<div class="card">
    <div class="game-label">Global Pursuit · Case #${c.number}</div>
    <hr style="margin-top:8px;">
    <div style="margin-top:20px;">
      <div class="result-emoji">${grid}</div>
      <div class="result-head win">Criminal Captured!</div>
      <div class="result-efficiency">${score}%</div>
      <div class="result-eff-label">Path Efficiency</div>
      <div class="result-sub">${c.criminal} &nbsp;·&nbsp; ${subtitle}</div>
    </div>
    <div class="director-capture">
      <div class="director-capture-label">Director Vance</div>
      <div class="director-capture-text">Outstanding. They had a twelve-hour head start. Case closed.</div>
    </div>
    <div class="share-preview">${shareText}</div>
    <div class="btn-row">
      <button class="btn btn-gold" id="copybtn" onclick="copyShare()">Copy to share</button>
      <button class="btn btn-dark" onclick="nextCase()">Next case →</button>
    </div>
  </div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
