<head>

  <style>

    body {

    .dot.done   { background: #22c55e; }

</head>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function legEmoji(score) {
  if (score >= 100) return '🔥';
  if (score >= 80)  return '🏆';
  if (score >= 60)  return '🎯';
  if (score >= 40)  return '😅';
  return '💀';
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let S = {
  screen:              'brief',  // 'brief' | 'game' | 'wrong-city' | 'result'
  caseIdx:             0,
  legIdx:              0,
  witnessIdx:          0,        // witnesses revealed: 0 = W1 only, 1 = W1+W2, 2 = all 3
  wrongGuessesThisLeg: 0,
  eliminatedIdxs:      [],       // option indexes already guessed wrong
  legScores:           [],       // score per completed leg
  guessLocked:         false,    // true after correct guess, awaiting advance
  correctCityName:     null,
  wrongCityName:       null,
  wrongCityNope:       null,
  mode:                'fly',    // 'fly' | 'globe'
};

function C()   { return CASES[S.caseIdx]; }
function leg() { return C().legs[S.legIdx]; }

function calcScore() {
  return Math.max(0, 100 - (S.witnessIdx * 20) - (S.wrongGuessesThisLeg * 25));
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function startCase() {
  Object.assign(S, {
    screen: 'game', legIdx: 0, witnessIdx: 0,
    wrongGuessesThisLeg: 0, eliminatedIdxs: [],
    legScores: [], guessLocked: false,
    correctCityName: null, wrongCityName: null, wrongCityNope: null
  });
  render();
}

function buyWitness() {
  if (S.witnessIdx >= 2 || S.guessLocked) return;
  S.witnessIdx++;
  render();
}

function guessCity(idx) {
  if (S.guessLocked) return;
  const l = leg();
  if (idx === l.correct) {
    S.legScores.push(calcScore());
    S.guessLocked = true;
    S.correctCityName = l.options[idx];
  } else {
    S.wrongGuessesThisLeg++;
    const wrongName = l.options[idx];
    if (S.mode === 'fly') {
      const nopeIdx = Math.min(S.wrongGuessesThisLeg - 1, l.nopeLines.length - 1);
      S.wrongCityName = wrongName;
      S.wrongCityNope = l.nopeLines[nopeIdx];
      S.screen = 'wrong-city';
    } else {
      S.eliminatedIdxs.push(idx);
    }
  }
  render();
}

function returnFromWrongCity() {
  const l = leg();
  const idx = l.options.indexOf(S.wrongCityName);
  if (idx !== -1) S.eliminatedIdxs.push(idx);
  S.wrongCityName = null;
  S.wrongCityNope = null;
  S.screen = 'game';
  render();
}

function advanceLeg() {
  if (S.legIdx >= 3) { S.screen = 'result'; render(); return; }
  S.legIdx++;
  S.witnessIdx = 0;
  S.wrongGuessesThisLeg = 0;
  S.eliminatedIdxs = [];
  S.guessLocked = false;
  S.correctCityName = null;
  render();
}

function nextCase() {
  S.caseIdx = (S.caseIdx + 1) % CASES.length;
  Object.assign(S, {
    screen: 'brief', legIdx: 0, witnessIdx: 0,
    wrongGuessesThisLeg: 0, eliminatedIdxs: [],
    legScores: [], guessLocked: false,
    correctCityName: null, wrongCityName: null, wrongCityNope: null
  });
  render();
}

function setMode(m) { S.mode = m; render(); }

function copyShare() {
  navigator.clipboard.writeText(buildShare()).then(() => {
    const b = document.getElementById('copybtn');
    if (b) { b.textContent = 'Copied ✓'; setTimeout(() => b.textContent = 'Copy result', 2000); }
  });
}

function buildShare() {
  const c = C();
  const total = S.legScores.reduce((a, b) => a + b, 0);
  const legs = S.legScores.map(s => `${legEmoji(s)}${s}`).join('  ');
  return `🕵️ Global Pursuit #${c.number}\n${legs}\n${total} / 400\nglobal-pursuit.app`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML =
    '<div class="proto-banner">PROTOTYPE v2 · deduction + scoring test</div>' +
    ({ brief: renderBrief, game: renderGame, 'wrong-city': renderWrongCity, result: renderResult }[S.screen] || renderBrief)();
}

function renderBrief() {
  const c = C();
  return `<div class="card">
    <div class="game-label">Global Pursuit · Case #${c.number}</div>
    <div class="case-title">${c.criminal}</div>

    <div class="label">Crime</div>
    <div class="meta-block">${c.crime}</div>

    <div class="label">Last seen</div>
    <div class="meta-block" style="margin-bottom:18px;">📍 ${c.startingCity}</div>

    <hr>
    <div class="label">Wrong guess mode — try both</div>
    <div class="mode-toggle">
      <button class="mode-btn ${S.mode==='fly'?'active':''}" onclick="setMode('fly')">✈️ Fly to wrong city</button>
      <button class="mode-btn ${S.mode==='globe'?'active':''}" onclick="setMode('globe')">🌍 Stay on globe</button>
    </div>

    <div class="label">Scoring</div>
    <div class="meta-block" style="font-size:13px;color:#9ca3af;margin-bottom:20px;">
      Each leg starts at <span style="color:#e8b84b;font-weight:600;">100 pts</span>. First clue is free.<br>
      Reveal extra clue: <span style="color:#fca5a5;">−20 pts</span> &nbsp;·&nbsp; Wrong guess: <span style="color:#fca5a5;">−25 pts</span>
    </div>

    <button class="btn btn-gold" onclick="startCase()">Begin the Chase →</button>
  </div>`;
}

function renderGame() {
  const c = C();
  const l = leg();
  const score = calcScore();
  const legNum = S.legIdx + 1;
  const revealed = l.witnesses.slice(0, S.witnessIdx + 1);
  const canBuy = S.witnessIdx < 2 && !S.guessLocked;

  // Dots
  const dots = Array.from({length:4},(_,i) => {
    const cls = i < S.legScores.length ? 'done' : i === S.legIdx ? 'active' : '';
    return `<div class="dot ${cls}"></div>`;
  }).join('');

  // Clue cards
  const clues = revealed.map((w, i) => `
    <div class="clue-card">
      <div class="clue-who">Witness ${i+1} · ${w.who}</div>
      <div class="clue-text">${w.clue}</div>
    </div>`).join('');

  // City buttons
  const cities = l.options.map((city, i) => {
    let cls = 'city-btn';
    let mark = '';
    let disabled = '';
    if (S.guessLocked) {
      if (i === l.correct) { cls += ' is-correct'; mark = '✓'; }
      disabled = 'disabled';
    } else if (S.eliminatedIdxs.includes(i)) {
      cls += ' is-eliminated'; disabled = 'disabled';
    }
    return `<button class="${cls}" onclick="guessCity(${i})" ${disabled}>
      ${city}<span class="city-mark">${mark}</span>
    </button>`;
  }).join('');

  // Score reveal block (after correct guess)
  const revealBlock = S.guessLocked ? `
    <div class="score-reveal">
      <div class="sr-num">${score}</div>
      <div class="sr-emoji">${legEmoji(score)}</div>
      <div class="sr-city">${S.correctCityName} confirmed</div>
    </div>` : '';

  // Continue button
  const continueBtn = S.guessLocked
    ? `<button class="btn btn-gold" onclick="advanceLeg()">${legNum>=4 ? 'See results →' : 'Fly to '+S.correctCityName+' →'}</button>`
    : '';

  return `<div class="card">
    <div class="game-label">Global Pursuit · Case #${c.number}</div>
    <div class="dots">${dots}</div>
    ${!S.guessLocked ? `
    <div class="score-row">
      <div>
        <div class="label" style="margin-bottom:2px;">Score this leg</div>
        <div class="score-num">${score}</div>
      </div>
      <div class="score-meta">
        <div class="score-meta-top">${legNum} / 4</div>
        <div class="score-meta-bot">move</div>
      </div>
    </div>` : ''}
    <div class="clue-stack">${clues}</div>
    ${canBuy ? `<button class="btn btn-ghost" onclick="buyWitness()" style="margin-bottom:12px;">Reveal next witness &nbsp;·&nbsp; −20 pts</button>` : ''}
    ${revealBlock}
    ${!S.guessLocked ? `<div class="label">Where are they headed?</div><div class="city-grid">${cities}</div>` : `<div class="city-grid">${cities}</div>`}
    ${continueBtn}
  </div>`;
}

function renderWrongCity() {
  const nope = S.wrongCityNope;
  const score = calcScore();
  return `<div class="card">
    <div class="wrong-header"><span class="wrong-badge">Wrong city</span></div>
    <div class="wrong-city-name">✈️ ${S.wrongCityName}</div>
    <div class="nope-quote">${nope.line}</div>
    <div class="nope-who">— ${nope.who}, ${S.wrongCityName}</div>
    <div class="feedback bad">−25 pts &nbsp;·&nbsp; Score now <strong>${score}</strong></div>
    <button class="btn btn-gold" onclick="returnFromWrongCity()">Back on the trail →</button>
  </div>`;
}

function renderResult() {
  const c = C();
  const total = S.legScores.reduce((a, b) => a + b, 0);
  const rows = S.legScores.map((s, i) =>
    `<div class="result-leg">
      <div class="result-leg-city">${C().legs[i].target}</div>
      <div class="result-leg-score">${legEmoji(s)} ${s}</div>
    </div>`).join('');
  const share = buildShare();

  return `<div class="card">
    <div class="game-label">Global Pursuit · Case #${c.number}</div>
    <div class="case-title" style="margin-bottom:16px;">Criminal Caught 🎉</div>
    <div class="result-legs">${rows}</div>
    <div class="result-total">
      <div class="rt-num">${total}</div>
      <div class="rt-max">out of 400</div>
    </div>
    <div class="label">Your result</div>
    <div class="share-box">${share}</div>
    <div class="btn-row">
      <button class="btn btn-gold" id="copybtn" onclick="copyShare()">Copy result</button>
      <button class="btn btn-dark" onclick="nextCase()">Next case →</button>
    </div>
  </div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
