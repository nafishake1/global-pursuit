<!DOCTYPE html>
<html>
<head>
  <title>Connecting to Mapillary…</title>
  <style>
    body { margin: 0; background: #04040c; color: #fff; font-family: system-ui, sans-serif;
           display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.15);
               border-top-color: #e8b84b; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: rgba(255,255,255,0.5); font-size: 14px; }
    .err { color: #f87171; font-size: 13px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p id="msg">Connecting to Mapillary…</p>

<script>
var CLIENT_ID     = '25560966663577439';
var CLIENT_SECRET = '87f972f62e0f0cc6cd2ff1cdbe5e4ac0';
var REDIRECT_URI  = 'http://localhost:3003/oauth.html';

var params = new URLSearchParams(window.location.search);
var code   = params.get('code');

if (!code) {
  document.getElementById('msg').textContent = 'No code found in URL.';
} else {
  document.getElementById('msg').textContent = 'Exchanging code for token…';

  fetch('https://graph.mapillary.com/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'OAuth ' + CLIENT_SECRET
    },
    body: JSON.stringify({
      grant_type: 'authorization_code',
      code:       code,
      client_id:  CLIENT_ID
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.access_token) {
      localStorage.setItem('mly_user_token', data.access_token);
      document.getElementById('msg').textContent = 'Connected! Returning to game…';
      setTimeout(function() { window.location.href = '/'; }, 800);
    } else {
      document.getElementById('msg').innerHTML =
        '<span class="err">Token exchange failed: ' + JSON.stringify(data) + '</span>';
    }
  })
  .catch(function(e) {
    document.getElementById('msg').innerHTML = '<span class="err">Network error: ' + e + '</span>';
  });
}
</script>
</body>
</html>
