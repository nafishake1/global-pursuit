<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Pursuit — Web Prototype</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --card: #1a1a2e; --border: #2a2a42;
      --gold: #e8b84b; --text: #e5e7eb; --muted: #9ca3af; --dim: #6b7280;
      --green: #22c55e; --red: #ef4444; --radius: 14px;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }

    /* ─── TWO-PANEL LAYOUT ─────────────────── */
    #app { display: flex; height: 100vh; width: 100vw; }

    /* ─── LEFT: PHONE PANEL ────────────────── */
    .phone-panel {
      width: 390px; flex-shrink: 0;
      display: flex; flex-direction: column; height: 100vh;
      background: #0d0d18;
      border-right: 1px solid var(--border);
      position: relative; z-index: 10;
    }
    .chat-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px 12px; background: #111120;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      position: sticky; top: 0; z-index: 10;
    }
    .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #2a1a00, #e8b84b33);
      border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: var(--gold); flex-shrink: 0;
    }
    .chat-meta { flex: 1; }
    .chat-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .chat-status { font-size: 11px; color: var(--gold); margin-top: 1px; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 16px 12px;
      display: flex; flex-direction: column; justify-content: flex-end; gap: 10px;
      scrollbar-width: none; -ms-overflow-style: none; overflow-anchor: none;
    }
    .chat-messages::-webkit-scrollbar { display: none; }
    .bubble {
      max-width: 82%; padding: 11px 15px; border-radius: 20px; border-bottom-left-radius: 5px;
      font-size: 14px; line-height: 1.55; color: var(--text);
      background: var(--card); border: 1px solid var(--border); align-self: flex-start;
      animation: bubbleIn 0.28s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(8px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 12px 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; border-bottom-left-radius: 5px;
      width: fit-content; align-self: flex-start; animation: bubbleIn 0.2s ease forwards;
    }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--dim);
      animation: typingBounce 1.1s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.18s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.5; }
      30%          { transform: translateY(-5px); opacity: 1; }
    }

    /* Attachment chip */
    .attach-chip {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 10px 14px; cursor: pointer;
      align-self: flex-start; max-width: 86%;
      animation: bubbleIn 0.32s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0;
    }
    .attach-icon-box {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #9a6810, #e8b84b);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .attach-meta { flex: 1; min-width: 0; }
    .attach-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attach-sub  { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .attach-arrow { font-size: 18px; color: var(--dim); }

    /* Expanded case file */
    .case-file-wrap {
      align-self: flex-start; width: 90%;
      animation: caseFileOpen 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0; border-radius: 14px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    @keyframes caseFileOpen {
      from { opacity: 0; transform: scale(0.9) translateY(10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    .artifact-photo {
      background: linear-gradient(160deg, #1e1205 0%, #3d2509 50%, #1e1205 100%);
      padding: 28px 20px 22px; display: flex; flex-direction: column;
      align-items: center; text-align: center; position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .artifact-photo::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 22px, rgba(232,184,75,0.03) 22px, rgba(232,184,75,0.03) 23px);
    }
    .artifact-emoji { font-size: 54px; position: relative; z-index: 1; filter: drop-shadow(0 0 16px rgba(232,184,75,0.45)); }
    .artifact-name  { font-size: 11px; font-weight: 800; color: rgba(232,184,75,0.85); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 10px; position: relative; z-index: 1; }
    .artifact-desc  { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; letter-spacing: 0.06em; position: relative; z-index: 1; }
    .case-file-body { background: #c4913a; padding: 14px 16px 16px; }
    .case-file-stamp { font-size: 9px; font-weight: 900; letter-spacing: 0.14em; color: rgba(70,35,0,0.5); text-transform: uppercase; text-decoration: line-through; text-decoration-color: rgba(160,0,0,0.4); margin-bottom: 8px; }
    .case-file-title { font-size: 17px; font-weight: 800; color: #280f00; margin-bottom: 5px; }
    .case-file-desc  { font-size: 12px; color: rgba(40,15,0,0.72); line-height: 1.55; margin-bottom: 10px; }
    .case-file-lastseen { font-size: 12px; color: rgba(40,15,0,0.6); margin-bottom: 14px; font-weight: 600; }
    .case-file-lastseen strong { color: #280f00; }
    .btn-gonow {
      display: block; width: 100%; padding: 14px 20px;
      background: #1a0a00; color: var(--gold);
      border: none; border-radius: 9px; font-size: 15px; font-weight: 800;
      letter-spacing: 0.04em; cursor: pointer; text-align: center;
    }
    .btn-gonow:active { opacity: 0.85; }

    /* iMessage input bar */
    .chat-input-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 8px;
      padding: 10px 12px 28px; background: #111120;
      border-top: 1px solid var(--border);
    }
    .chat-input-field {
      flex: 1; background: rgba(255,255,255,0.05);
      border: 1px solid #333350; border-radius: 22px;
      padding: 10px 16px; font-size: 15px; color: var(--text);
      outline: none; pointer-events: none; font-family: inherit;
    }
    .chat-input-field::placeholder { color: #555570; }
    .chat-send-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: #333350; border: none; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: #555570; cursor: default;
    }

    /* ─── RIGHT: STAGE PANEL ───────────────── */
    .stage-panel {
      flex: 1; position: relative; height: 100vh; overflow: hidden;
      background: #04040c;
    }

    /* Globe fills the stage */
    #globe-stage {
      position: absolute; inset: 0;
      background: #04040c;
    }
    #globe-stage canvas { display: block; }

    /* Witness stage */
    #witness-stage {
      position: absolute; inset: 0;
      display: none;
      background-color: #070b18;
      background-size: cover; background-position: center;
    }
    #witness-stage.active { display: flex; flex-direction: column; }
    .witness-photo-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to top, rgba(4,4,12,0.88) 0%, rgba(4,4,12,0.15) 45%, rgba(4,4,12,0.05) 100%);
      pointer-events: none;
    }
    #sv-container {
      position: absolute; inset: 0; z-index: 0;
      opacity: 0; transition: opacity 0.9s ease;
      background: #070b18;
    }
    #sv-container.loaded { opacity: 1; }
    /* Make mapillary-js viewer fill its container */
    #sv-container > div { width: 100% !important; height: 100% !important; }
    #sv-container { pointer-events: none; }
    /* ── Landing panel (city arrival) ─────── */
    #landing-panel {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: flex-end; padding: 0 40px 52px;
    }
    .landing-inner { display: flex; flex-direction: column; }
    .landing-tag { font-size: 11px; font-weight: 800; letter-spacing: 0.18em; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
    .landing-city { font-size: 56px; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 2px 24px rgba(0,0,0,0.9); margin-bottom: 6px; }
    .landing-meta { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 24px; }
    .btn-get-intel {
      align-self: flex-start; padding: 15px 28px;
      background: var(--gold); color: #0d0d14;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.02em;
    }
    .btn-get-intel:active { opacity: 0.85; transform: scale(0.98); }

    /* ── Clue panel (slides up) ────────────── */
    #clue-panel {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.16,1,0.3,1);
      background: rgba(8,8,18,0.96);
      backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      padding: 24px 32px 36px;
    }
    #clue-panel.open { transform: translateY(0); }
    .clue-panel-row { display: flex; align-items: flex-start; gap: 24px; }
    .witness-avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: var(--card); border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .clue-panel-body { flex: 1; min-width: 0; }
    .witness-clue-num { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 2px; }
    .witness-name { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 10px; }
    .witness-clue-text { font-size: 15px; color: var(--text); line-height: 1.65; font-style: italic; }
    .clue-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-more-intel {
      flex: 1; padding: 13px 16px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 10px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer;
    }
    .btn-more-intel:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
    .btn-more-intel:disabled { opacity: 0.3; cursor: default; }
    .btn-travel {
      flex: 1; padding: 13px 16px;
      background: var(--gold); color: #0d0d14;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer;
    }
    .btn-travel:active { opacity: 0.85; }

    /* Stage HUD */
    #stage-hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 18px 24px 14px;
      background: linear-gradient(to bottom, rgba(4,4,12,0.9) 70%, transparent);
      pointer-events: none;
    }
    #stage-hud.hidden { display: none; }
    .hud-left { display: flex; flex-direction: column; gap: 2px; }
    #hud-move { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    #hud-state {
      font-size: 15px; font-weight: 800; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    #hud-state::before {
      content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); animation: hudPulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 6px var(--gold);
    }
    @keyframes hudPulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.6); } }
    .hud-right { text-align: right; }
    .hud-score-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
    #hud-score { font-size: 28px; font-weight: 900; color: var(--gold); line-height: 1.1; text-shadow: 0 0 12px rgba(232,184,75,0.4); }
    #hud-witnesses { font-size: 10px; color: var(--dim); margin-top: 1px; }

    /* Flight overlay */
    #flight-overlay {
      position: absolute; inset: 0; z-index: 30;
      display: none; align-items: center; justify-content: center;
      background: rgba(4,4,12,0.55); backdrop-filter: blur(2px);
      pointer-events: none;
    }
    #flight-overlay.active { display: flex; }
    .flight-text { text-align: center; }
    .flight-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .flight-city  { font-size: 32px; font-weight: 900; color: var(--text); }
    .flight-sub   { font-size: 13px; color: var(--muted); margin-top: 6px; }

    /* Result/score overlay on stage */
    #stage-overlay {
      position: absolute; inset: 0; z-index: 40;
      display: none; align-items: center; justify-content: center;
      background: rgba(4,4,12,0.88); backdrop-filter: blur(8px);
      padding: 32px 24px; overflow-y: auto;
    }
    #stage-overlay.active { display: flex; flex-direction: column; }
    .overlay-inner { width: 100%; max-width: 480px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 20px; margin-bottom: 12px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px; border-radius: 20px; font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
    .badge-red   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
    .badge-green { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
    .badge-gold  { background: rgba(232,184,75,0.12); border: 1px solid rgba(232,184,75,0.3); color: var(--gold); }
    h1 { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    h2 { font-size: 19px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--muted); line-height: 1.55; }
    .director-block { border-left: 3px solid var(--gold); padding: 12px 14px; background: rgba(232,184,75,0.06); border-radius: 0 8px 8px 0; margin: 14px 0; }
    .director-block p { font-size: 14px; font-style: italic; color: var(--text); line-height: 1.6; }
    .director-block .attr { font-size: 11px; color: var(--gold); font-weight: 600; margin-top: 6px; font-style: normal; }
    .nope-block { border-left: 3px solid var(--red); padding: 12px 14px; background: rgba(239,68,68,0.06); border-radius: 0 8px 8px 0; margin: 12px 0; }
    .nope-block p { font-size: 14px; font-style: italic; color: var(--text); line-height: 1.6; }
    .nope-block .attr { font-size: 11px; color: var(--red); font-weight: 600; margin-top: 5px; font-style: normal; }
    .score-reveal { text-align: center; padding: 18px 0; }
    .score-reveal .number { font-size: 72px; font-weight: 900; color: var(--gold); line-height: 1; display: block; animation: scorePopIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes scorePopIn { from { transform:scale(0.4); opacity:0; } 60% { transform:scale(1.1); } to { transform:scale(1); opacity:1; } }
    .score-reveal .emoji { font-size: 34px; margin: 4px 0; display: block; animation: emojiBounce 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
    @keyframes emojiBounce { from { transform:scale(0) rotate(-15deg); opacity:0; } 70% { transform:scale(1.2) rotate(5deg); } to { transform:scale(1) rotate(0); opacity:1; } }
    .score-reveal .city-confirm { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 6px; }
    .capture-stamp { display: inline-block; border: 3px solid var(--red); border-radius: 5px; padding: 7px 16px; font-size: 20px; font-weight: 900; letter-spacing: 0.15em; color: var(--red); text-transform: uppercase; transform: rotate(-4deg); margin: 10px 0 14px; animation: stampAppear 0.4s cubic-bezier(0.16,1,0.3,1) 0.5s both; opacity: 0; }
    @keyframes stampAppear { from { transform:rotate(-4deg) scale(1.6); opacity:0; } to { transform:rotate(-4deg) scale(1); opacity:0.85; } }
    .btn { display: block; width: 100%; padding: 15px 20px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; text-align: center; margin-top: 10px; }
    .btn-primary { background: var(--gold); color: #0d0d14; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .leg-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .leg-row:last-child { border-bottom: none; }
    .leg-city { font-size: 14px; color: var(--text); font-weight: 600; }
    .leg-score-right { display: flex; align-items: center; gap: 8px; }
    .leg-score-num { font-size: 17px; font-weight: 800; color: var(--gold); }
    .total-row { display: flex; justify-content: space-between; align-items: baseline; padding: 13px 0 0; margin-top: 4px; border-top: 2px solid var(--border); }
    .total-label { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .total-num { font-size: 26px; font-weight: 900; color: var(--gold); }
    .total-max { font-size: 13px; color: var(--dim); }
    .share-card { background: #0a0a12; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-family: 'Courier New', monospace; font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre; margin: 14px 0; overflow-x: auto; }
    .copy-feedback { font-size: 12px; color: var(--green); text-align: center; height: 16px; margin-bottom: 6px; }
    .result-header { text-align: center; padding: 6px 0 18px; }
    .result-header h1 { font-size: 26px; color: var(--gold); }
    .result-header .sub { font-size: 13px; color: var(--muted); margin-top: 5px; }
    .feedback-pill { display: inline-block; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); border-radius: 8px; padding: 7px 13px; font-size: 13px; color: var(--red); margin: 10px 0 14px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── Correct city flash ─────────────────── */
    #correct-flash {
      position: absolute; inset: 0; z-index: 60;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(4,4,12,0.72); backdrop-filter: blur(3px);
      pointer-events: none; opacity: 0;
      transition: opacity 0.32s ease;
    }
    #correct-flash.show { opacity: 1; pointer-events: auto; }
    .cf-pin {
      font-size: 100px; line-height: 1; display: block;
      filter: drop-shadow(0 0 36px rgba(232,184,75,0.75));
      transform: translateY(-220px) scale(1.5);
    }
    #correct-flash.show .cf-pin {
      animation: cfPinDrop 0.52s cubic-bezier(0.34,1.5,0.64,1) forwards;
    }
    @keyframes cfPinDrop {
      0%   { transform: translateY(-220px) scale(1.5); }
      68%  { transform: translateY(10px) scale(0.94); }
      82%  { transform: translateY(-12px) scale(1.04); }
      100% { transform: translateY(0) scale(1); }
    }
    .cf-label {
      margin-top: 20px;
      background: var(--gold); color: #0d0d14;
      padding: 11px 36px; border-radius: 9px;
      font-size: 30px; font-weight: 900; letter-spacing: 0.07em; text-transform: uppercase;
      box-shadow: 0 6px 40px rgba(232,184,75,0.45);
      transform: scale(0); opacity: 0;
    }
    #correct-flash.show .cf-label {
      animation: cfLabelPop 0.36s cubic-bezier(0.34,1.65,0.64,1) 0.40s forwards;
    }
    @keyframes cfLabelPop {
      from { transform: scale(0);    opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .cf-sub {
      margin-top: 11px; font-size: 11px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.45); opacity: 0;
    }
    #correct-flash.show .cf-sub {
      animation: cfSubFade 0.28s ease 0.65s forwards;
    }
    @keyframes cfSubFade { from { opacity:0; } to { opacity:1; } }

    /* Map hint */
    #pick-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(26,26,46,0.9); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 18px; font-size: 12px; color: var(--muted);
      white-space: nowrap; pointer-events: none; z-index: 20;
      display: none;
    }
    #pick-hint.visible { display: block; }

    /* Globe pin elements */
    .globe-pin {
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      transform: translate(-50%, -100%);
      pointer-events: all;
      transition: transform 0.15s;
    }
    .globe-pin:hover { transform: translate(-50%, -100%) scale(1.15); }

// Pre-warm: fetch + cache the pano ID during flight, but don't render yet.
function prefetchStreetView(lat, lng, cityName) {
  if (typeof google === 'undefined' || !google.maps || !google.maps.StreetViewService) return;
  if (_svCache[cityName] !== undefined) return; // already cached

  if (!_svService) _svService = new google.maps.StreetViewService();
  var landmark  = CITY_LANDMARKS[cityName];
  var searchLat = landmark ? landmark.lat : lat;
  var searchLng = landmark ? landmark.lng : lng;
  var preference = landmark
    ? google.maps.StreetViewPreference.BEST
    : google.maps.StreetViewPreference.NEAREST;

  var radii = landmark ? [100, 500, 2000] : [200, 1000, 5000];
  function _search(idx) {
    if (idx >= radii.length) { _svCache[cityName] = null; return; }
    _svService.getPanorama({
      location: { lat: searchLat, lng: searchLng },
      radius:   radii[idx],
      source:   google.maps.StreetViewSource.OUTDOOR,
      preference: preference
    }, function(data, status) {
      console.log('[GSV prefetch] radius='+radii[idx]+'m for', cityName, '->', status);
      if (status === google.maps.StreetViewStatus.OK && data && data.location) {
        _svCache[cityName] = data.location.pano;
      } else {
        _search(idx + 1);
      }
    });
  }
  _search(0);
}

// Render: call only when #witness-stage is visible. Uses cached pano ID if available,
// otherwise fetches it first then renders.
function loadStreetView(lat, lng, cityName) {
  var container = document.getElementById('sv-container');
  container.classList.remove('loaded');

  if (typeof google === 'undefined' || !google.maps || !google.maps.StreetViewService) {
    console.log('[GSV] google.maps not ready; using photo fallback for', cityName);
    _renderSVImage(null, cityName);
    return;
  }

  // Cache hit — render immediately
  if (_svCache[cityName] !== undefined) {
    _renderSVImage(_svCache[cityName], cityName);
    return;
  }

  // Cache miss — fetch then render
  if (!_svService) _svService = new google.maps.StreetViewService();
  var landmark  = CITY_LANDMARKS[cityName];
  var searchLat = landmark ? landmark.lat : lat;
  var searchLng = landmark ? landmark.lng : lng;
  var preference = landmark
    ? google.maps.StreetViewPreference.BEST
    : google.maps.StreetViewPreference.NEAREST;

  var radii = landmark ? [100, 500, 2000] : [200, 1000, 5000];
  function _search(idx) {
    if (idx >= radii.length) {
      console.log('[GSV] no outdoor imagery for', cityName);
      _svCache[cityName] = null;
      _renderSVImage(null, cityName);
      return;
    }
    _svService.getPanorama({
      location: { lat: searchLat, lng: searchLng },
      radius:   radii[idx],
      source:   google.maps.StreetViewSource.OUTDOOR,
      preference: preference
    }, function(data, status) {
      console.log('[GSV] radius='+radii[idx]+'m for', cityName, '->', status);
      if (status === google.maps.StreetViewStatus.OK && data && data.location) {
        _svCache[cityName] = data.location.pano;
        _renderSVImage(_svCache[cityName], cityName);
      } else {
        _search(idx + 1);
      }
    });
  }
  _search(0);
}

function _renderSVImage(panoId, cityName) {
  var container = document.getElementById('sv-container');
  var stage     = document.getElementById('witness-stage');

  if (!panoId) {
    container.style.display = 'none';
    if (CITY_PHOTOS[cityName]) {
      stage.style.backgroundImage = 'url(' + CITY_PHOTOS[cityName] + ')';
    }
    return;
  }

  container.style.display = 'block';
  stage.style.backgroundImage = '';

  var landmark = CITY_LANDMARKS[cityName];
  var pov = landmark ? { heading: landmark.heading, pitch: 0 } : null;

  if (!_svPanorama) {
    var opts = {
      disableDefaultUI:      true,
      addressControl:        false,
      linksControl:          false,
      panControl:            false,
      zoomControl:           false,
      fullscreenControl:     false,
      motionTracking:        false,
      motionTrackingControl: false,
      showRoadLabels:        false,
      clickToGo:             false,
      scrollwheel:           false,
      zoom:                  0
    };
    if (pov) opts.pov = pov;
    _svPanorama = new google.maps.StreetViewPanorama(container, opts);
    google.maps.event.addListenerOnce(_svPanorama, 'tiles_loaded', function() {
      container.classList.add('loaded');
    });
    _svPanorama.setPano(panoId);
  } else {
    if (pov) _svPanorama.setPov(pov);
    google.maps.event.addListenerOnce(_svPanorama, 'tiles_loaded', function() {
      container.classList.add('loaded');
    });
    _svPanorama.setPano(panoId);
  }
  google.maps.event.trigger(_svPanorama, 'resize');
}

var Audio = (function() {
  var ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, t, dur, type, vol) {
    var c=getCtx(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol||0.12,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }
  return {
    click:   function(){try{var c=getCtx();tone(900,c.currentTime,0.07,'square',0.06);}catch(e){}},
    reveal:  function(){try{var c=getCtx(),t=c.currentTime;tone(440,t,0.07,'sine',0.08);tone(660,t+0.08,0.14,'sine',0.11);}catch(e){}},
    correct: function(){try{var c=getCtx(),t=c.currentTime;tone(523,t,0.14,'sine',0.14);tone(659,t+0.12,0.14,'sine',0.14);tone(784,t+0.24,0.30,'sine',0.16);}catch(e){}},
    wrong:   function(){try{var c=getCtx(),t=c.currentTime;tone(260,t,0.15,'sawtooth',0.09);tone(200,t+0.14,0.22,'sawtooth',0.07);}catch(e){}},
    correctBig: function(){try{
      var c=getCtx(),t=c.currentTime;
      // Fast ascending arpeggio A4→C#5→E5→A5, then big top note
      [440,554,659,880].forEach(function(f,i){tone(f,t+i*0.09,0.18,'sine',0.13);});
      tone(1175,t+0.42,0.55,'sine',0.18);   // D6 — triumphant peak
      tone(587, t+0.42,0.55,'triangle',0.08); // D5 — harmony layer
    }catch(e){}},
    fanfare: function(){try{var c=getCtx(),t=c.currentTime;[523,659,784,1047].forEach(function(f,i){tone(f,t+i*0.11,0.22,'sine',0.14);});}catch(e){}},
    copy:    function(){try{var c=getCtx();tone(1047,c.currentTime,0.12,'sine',0.09);}catch(e){}},
    message: function(){try{var c=getCtx(),t=c.currentTime;tone(800,t,0.04,'sine',0.07);tone(1000,t+0.05,0.06,'sine',0.07);}catch(e){}},
  };
})();

var World = null;
var worldCountriesLoaded = false;

var COUNTRY_PALETTE = [
  '#2d6a4f','#1e4d8c','#8b3a3a','#6b4a8c','#8c6b2a',
  '#2a7a6a','#7a4a2a','#3a6b8c','#4a6b3a','#7a2a6b',
];

function countryColor(feat) {
  var id = parseInt(feat.id) || 0;
  return COUNTRY_PALETTE[(id * 13) % COUNTRY_PALETTE.length];
}

function initGlobe() {
  if (typeof Globe === 'undefined') {
    console.warn('globe.gl not loaded');
    return;
  }

  var container = document.getElementById('globe-stage');
  var W = container.clientWidth, H = container.clientHeight;

  World = Globe({ animateIn: false })
    .width(W).height(H)
    .backgroundColor('rgba(4,4,12,1)')
    .showAtmosphere(true)
    .atmosphereColor('#2a4aaa')
    .atmosphereAltitude(0.18)
    // Arcs (flight paths)
    .arcsData([])
    .arcColor('color')
    .arcDashLength(0.5)
    .arcDashGap(0.15)
    .arcDashAnimateTime(2000)
    .arcStroke(1.2)
    .arcAltitudeAutoScale(0.35)
    // HTML pins (city markers)
    .htmlElementsData([])
    .htmlElement(function(d) {
      var div = document.createElement('div');
      div.className = 'globe-pin';
      div.innerHTML =
        '<div class="globe-pin-dot' + (d.elim ? ' elim':'') + '"></div>' +
        '<div class="globe-pin-label' + (d.elim ? ' elim':'') + '">' + d.name + '</div>';
      if (!d.elim) {
        div.addEventListener('click', function(e) {
          e.stopPropagation();
          Audio.click();
          handleCityTap(d.name, d.idx);
        });
      }
      return div;
    })
    .htmlLat(function(d){ return d.lat; })
    .htmlLng(function(d){ return d.lng; })
    .htmlAltitude(0.05)
    (container);

  // Load country polygons
  fetch('world-110m.json')
    .then(function(r){ return r.json(); })
    .then(function(topo) {
      var countries = topojson.feature(topo, topo.objects.countries);
      World
        .polygonsData(countries.features.filter(function(f){ return f.geometry; }))
        .polygonCapColor(countryColor)
        .polygonSideColor(function(){ return 'rgba(0,0,0,0.4)'; })
        .polygonStrokeColor(function(){ return '#111'; })
        .polygonAltitude(0.005);
      worldCountriesLoaded = true;
    });

  // Resize
  window.addEventListener('resize', function() {
    if (!World) return;
    var c = document.getElementById('globe-stage');
    World.width(c.clientWidth).height(c.clientHeight);
  });
}

function globeFlyTo(lat, lng, alt, ms) {
  if (!World) return;
  World.pointOfView({ lat: lat, lng: lng, altitude: alt || 2.0 }, ms || 1200);
}

function addFlightArc(fromLat, fromLng, toLat, toLng, color, animMs) {
  if (!World) return;
  var arcs = [{ startLat: fromLat, startLng: fromLng, endLat: toLat, endLng: toLng, color: color||'#e8b84b' }];
  World
    .arcsData(arcs)
    .arcDashAnimateTime(animMs || 2000);
}

function clearArcs() {
  if (!World) return;
  World.arcsData([]);
}

function setPins(options, eliminatedIdxs) {
  if (!World) return;
  var pins = options.map(function(opt, idx) {
    return { name: opt.name, lat: opt.lat, lng: opt.lng, idx: idx, elim: (eliminatedIdxs||[]).includes(idx) };
  });
  World.htmlElementsData(pins);
}

function clearPins() {
  if (!World) return;
  World.htmlElementsData([]);
}

  var ws = leg().witnesses[S.witnessIdx];
  document.getElementById('witness-avatar').textContent    = WITNESS_AVATARS[ws.who] || '👁';
  document.getElementById('witness-clue-num').textContent  = 'CLUE ' + (S.witnessIdx+1) + (S.witnessIdx===0 ? ' · FREE' : ' · −20 pts');
  document.getElementById('witness-name').textContent      = ws.who;
  document.getElementById('witness-clue-text').textContent = ws.clue;
  var btn = document.getElementById('btn-more-intel');
  btn.disabled = (S.witnessIdx >= 2);
  btn.textContent = S.witnessIdx >= 2 ? 'All intel revealed' : 'More intel · −20 pts';
}

// ────────────────────────────────────────────
// CHAT BRIEF
// ────────────────────────────────────────────
function startBriefSequence() {
  var c = C();
  var container = document.getElementById('chat-messages');
  container.innerHTML = '';

  function addBubble(text) {
    var d = document.createElement('div');
    d.className = 'bubble'; d.textContent = text;
    container.appendChild(d);
    container.scrollTop = container.scrollHeight;
    Audio.message();
  }
  function showTyping() {
    var d = document.createElement('div');
    d.className = 'typing-indicator'; d.id = 'typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(d);
    container.scrollTop = container.scrollHeight;
  }
  function removeTyping() { var t=document.getElementById('typing'); if(t)t.remove(); }

  function addChip() {
    var d = document.createElement('div');
    d.className = 'attach-chip'; d.id = 'attach-chip';
    d.onclick = expandCaseFile;
    d.innerHTML =
      '<div class="attach-icon-box">📁</div>' +
      '<div class="attach-meta"><div class="attach-name">Case File — Classified</div><div class="attach-sub">Tap to open</div></div>' +
      '<div class="attach-arrow">›</div>';
    container.appendChild(d);
    container.scrollTop = container.scrollHeight;
    Audio.message();
  }

  var seq = [
    { delay: 500,  type:'typing' },
    { delay: 1300, type:'bubble', text:'Detective. We need your help.' },
    { delay: 2100, type:'typing' },
    { delay: 3400, type:'bubble', text:c.crime },
    { delay: 4400, type:'typing' },
    { delay: 5300, type:'bubble', text:c.directorBrief },
    { delay: 6100, type:'typing' },
    { delay: 6900, type:'chip' },
  ];
  seq.forEach(function(item) {
    setTimeout(function() {
      if (item.type==='typing')       showTyping();
      else if (item.type==='bubble') { removeTyping(); addBubble(item.text); }
      else if (item.type==='chip')   { removeTyping(); addChip(); }
    }, item.delay);
  });
}

function expandCaseFile() {
  var chip = document.getElementById('attach-chip'); if(!chip) return;
  var c = C();
  var container = document.getElementById('chat-messages');
  Audio.click();

  var wrap = document.createElement('div');
  wrap.className = 'case-file-wrap';
  wrap.innerHTML =
    '<div class="artifact-photo">' +
      '<div class="artifact-emoji">' + c.artifact.emoji + '</div>' +
      '<div class="artifact-name">' + c.artifact.name + '</div>' +
      '<div class="artifact-desc">' + c.artifact.desc + '</div>' +
    '</div>' +
    '<div class="case-file-body">' +
      '<div class="case-file-stamp">CASE #' + c.number + ' — CONFIDENTIAL</div>' +
      '<div class="case-file-title">' + c.criminal + '</div>' +
      '<div class="case-file-desc">' + c.crime + '</div>' +
      '<div class="case-file-lastseen">Last confirmed sighting: <strong>' + c.startingCity + '</strong></div>' +
      '<button class="btn-gonow" onclick="onAcceptCase()">Go Now! →</button>' +
    '</div>';

  chip.replaceWith(wrap);
  container.scrollTop = container.scrollHeight;
}

// ────────────────────────────────────────────
// GAME ACTIONS
// ────────────────────────────────────────────
function onAcceptCase() {
  Audio.click();
  S.legIdx=0; S.witnessIdx=0; S.wrongGuessesThisLeg=0; S.activeClueTab=0;
  S.eliminatedIdxs=[]; S.legScores=[];

  var c = C();
  S.currentCity = c.startingCity;

  // NYC as origin — show globe + start flight immediately, no geolocation wait
  var fromLat = 40.71, fromLng = -74.01;
  S.currentLat = fromLat; S.currentLng = fromLng;

  showGlobeStage();
  hideWitnessStage();
  hideStageOverlay();
  hidePickHint();
  showHUD();
  showFlightOverlay('Deploying to', c.startingCity, 'Flying from New York…');

  // Init globe now that stage is visible and has real dimensions
  if (!World) { initGlobe(); }

  // Point globe at NYC instantly, then arc to starting city
  globeFlyTo(fromLat, fromLng, 2.2, 0);

  setTimeout(function() {
    hideFlightOverlay();
    addFlightArc(fromLat, fromLng, c.startLat, c.startLng, '#e8b84b', 2400);
    globeFlyTo(c.startLat, c.startLng, 1.8, 2600);
    loadStreetView(c.startLat, c.startLng, c.startingCity); // pre-warm during flight

    setTimeout(function() {
      clearArcs();
      S.currentLat = c.startLat; S.currentLng = c.startLng;
      clearPins();
      S.activeClueTab = 0;
      showCityLanding();
      updateHUD();
    }, 3000);
  }, 900);
}

function buyWitness() {
  if (S.witnessIdx < 2) {
    Audio.reveal();
    S.witnessIdx++;
    updateCluePanel();
    updateHUD();
  }
}

function openMap() {
  Audio.click();
  hideWitnessStage();
  showGlobeStage();
  showPickHint();
  hideStageOverlay();

  var opts = leg().options;
  var cLat = opts.reduce(function(s,o){return s+o.lat;},0)/opts.length;
  var cLng = opts.reduce(function(s,o){return s+o.lng;},0)/opts.length;
  setPins(opts, S.eliminatedIdxs);
  globeFlyTo(cLat, cLng, 1.6, 1200);
  updateHUD();
}

function handleCityTap(name, idx) {
  if (S.eliminatedIdxs.includes(idx)) return;

  if (idx === leg().correct) {
    // CORRECT
    Audio.correct();
    flash('rgba(34,197,94,0.2)', 0.5);
    S.legScores.push(calcScore());
    S.currentCity = name; // detective has now arrived here

    var opt = leg().options[idx];
    clearPins();
    hidePickHint();

    // Fly to correct city — pre-warm Street View during the arc
    loadStreetView(opt.lat, opt.lng, name);
    addFlightArc(S.currentLat, S.currentLng, opt.lat, opt.lng, '#e8b84b', 1800);
    globeFlyTo(opt.lat, opt.lng, 1.5, 2000);

    setTimeout(function() {
      clearArcs();
      S.currentLat = opt.lat; S.currentLng = opt.lng;
      showCorrectFlash(name, function() {
        if (S.legIdx >= 3) {
          showResult();
        } else {
          S.legIdx++;
          S.witnessIdx = 0; S.wrongGuessesThisLeg = 0;
          S.eliminatedIdxs = []; S.activeClueTab = 0;
          showCityLanding();
          updateHUD();
        }
      });
    }, 2200);

  } else {
    // WRONG
    Audio.wrong();
    flash('rgba(239,68,68,0.3)', 0.6);
    S.wrongGuessesThisLeg++;
    S.eliminatedIdxs.push(idx);

    var nopeIdx = Math.min(S.wrongGuessesThisLeg-1, leg().nopeLines.length-1);
    var nope = leg().nopeLines[nopeIdx];

    // Update pin to red
    setPins(leg().options, S.eliminatedIdxs);

    var score = calcScore();
    var remaining = 4 - S.eliminatedIdxs.length;
    showStageOverlay(
      '<div class="card">' +
        '<span class="badge badge-red">✕ Wrong City</span>' +
        '<h1 style="font-size:26px;margin-bottom:4px;">✈️ ' + name + '</h1>' +
        '<p class="subtitle">They were not here. The trail goes cold.</p>' +
        '<div class="nope-block"><p>' + nope.line + '</p><div class="attr">— ' + nope.who + '</div></div>' +
        '<div class="feedback-pill">−25 pts · Score now <strong>' + score + '</strong></div>' +
        '<hr class="divider"><p class="subtitle" style="font-size:13px;">' + remaining + ' cities remain.</p>' +
      '</div>' +
      '<button class="btn btn-primary" onclick="resumePursuit()">Resume Pursuit →</button>'
    );

    updateHUD();
  }
}

function resumePursuit() {
  hideStageOverlay();
  openMap();
}

function showCorrectCity(name) {
  var isFinal = S.legIdx === 3;
  var score   = S.legScores[S.legScores.length-1];
  var emoji   = legEmoji(score);
  var nextCity = isFinal ? null : C().legs[S.legIdx+1].target;
  var dirQ = isFinal
    ? 'Outstanding. They had a twelve-hour head start and you still caught them. Case closed.'
    : 'Good call, Agent. Keep moving. Every minute counts.';

  showStageOverlay(
    '<div class="card">' +
      '<span class="badge ' + (isFinal?'badge-red':'badge-green') + '">' + (isFinal?'🎯 Criminal Apprehended':'✓ Target Confirmed') + '</span>' +
      '<h1>' + name + '</h1>' +
      '<p class="subtitle">The trail was right.</p>' +
      '<div class="score-reveal">' +
        '<span class="number" id="score-count">0</span>' +
        '<span class="emoji">' + emoji + '</span>' +
        '<div class="city-confirm">' + name.toUpperCase() + ' CONFIRMED</div>' +
      '</div>' +
      (isFinal ? '<div style="text-align:center;margin-bottom:8px;"><span class="capture-stamp">CASE CLOSED</span></div>' : '') +
      '<div class="director-block"><p>' + dirQ + '</p><div class="attr">— Director, Global Pursuit Division</div></div>' +
    '</div>' +
    '<button class="btn btn-primary" onclick="advanceLeg()">' + (isFinal ? 'See Final Report →' : 'Fly to ' + nextCity + ' →') + '</button>'
  );

  setTimeout(function(){ countUp('score-count', score); }, 80);
  if (isFinal) setTimeout(function(){ Audio.fanfare(); }, 400);
}

function advanceLeg() {
  Audio.click();
  if (S.legIdx >= 3) { showResult(); return; }

  var fromLat = S.currentLat, fromLng = S.currentLng;
  S.legIdx++; S.witnessIdx=0; S.wrongGuessesThisLeg=0;
  S.eliminatedIdxs=[]; S.activeClueTab=0;

  hideStageOverlay();
  hideWitnessStage();
  showGlobeStage();
  clearPins();

  var opts = leg().options;
  var toLat = opts.reduce(function(s,o){return s+o.lat;},0)/opts.length;
  var toLng = opts.reduce(function(s,o){return s+o.lng;},0)/opts.length;

  showFlightOverlay('Flying to', opts[leg().correct].name + ' area', 'Move ' + (S.legIdx+1) + ' of 4');

  setTimeout(function() {
    hideFlightOverlay();
    addFlightArc(fromLat, fromLng, toLat, toLng, '#e8b84b', 2000);
    globeFlyTo(toLat, toLng, 1.8, 2200);

    setTimeout(function() {
      clearArcs();
      S.currentLat = toLat; S.currentLng = toLng;
      showCityLanding();
      updateHUD();
    }, 2600);
  }, 500);
}

function showResult() {
  var c=C(), legs=C().legs;
  var total=S.legScores.reduce(function(a,b){return a+b;},0);
  var rows='';
  for(var i=0;i<S.legScores.length;i++){
    var s=S.legScores[i];
    rows+='<div class="leg-row"><div class="leg-city">Leg '+(i+1)+' · '+legs[i].target+'</div><div class="leg-score-right"><span style="font-size:17px;">'+legEmoji(s)+'</span><span class="leg-score-num">'+s+'</span></div></div>';
  }
  showStageOverlay(
    '<div class="result-header"><span class="badge badge-gold" style="display:inline-flex;margin-bottom:10px;">🕵️ Case #'+c.number+' Complete</span><h1>Criminal Apprehended</h1><p class="sub" style="font-size:13px;color:var(--muted);margin-top:5px;">Global Pursuit Division thanks you for your service.</p></div>' +
    '<div class="card"><div style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;">Case Report — '+c.criminal+'</div>'+rows+
    '<div class="total-row"><span class="total-label">Total</span><span><span class="total-num">'+total+'</span> <span class="total-max">/ 400</span></span></div></div>' +
    '<div class="card"><div style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;">Share Your Result</div>' +
    '<div class="share-card">'+buildShareText()+'</div>' +
    '<div class="copy-feedback" id="copy-feedback"></div>' +
    '<button class="btn btn-ghost" onclick="copyShareCard()">Copy to Clipboard</button></div>' +
    '<button class="btn btn-primary" onclick="nextCase()">Next Case →</button>'
  );
}

function buildShareText() {
  var total=S.legScores.reduce(function(a,b){return a+b;},0);
  var emojis=S.legScores.map(function(s){return legEmoji(s)+s;}).join('  ');
  return '🕵️ Global Pursuit #'+C().number+'\n'+emojis+'\n'+total+' / 400\nglobal-pursuit.app';
}

function copyShareCard() {
  var text=buildShareText(); Audio.copy();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showCopyFeedback);
  } else {
    var ta=document.createElement('textarea'); ta.value=text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showCopyFeedback();
  }
}
function showCopyFeedback() {
  var el=document.getElementById('copy-feedback');
  if(el){el.textContent='✓ Copied!';setTimeout(function(){el.textContent='';},2000);}
}

function nextCase() {
  Audio.click();
  S.caseIdx=(S.caseIdx+1)%CASES.length;
  hideStageOverlay();
  hideWitnessStage();
  hidePickHint();
  hideHUD();
  clearPins(); clearArcs();
  startBriefSequence();
}

// ────────────────────────────────────────────
// BOOT
// ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  hideGlobeStage();
  hideHUD();
  hideWitnessStage();
  hideFlightOverlay();
  // Globe init is deferred until first showGlobeStage() call,
  // so it measures real dimensions (not 0x0 while hidden)
  startBriefSequence();
});
</script>
</body>
</html>
